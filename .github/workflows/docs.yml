name: Deploy documentation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/cli/**"       # CLI changes regenerate docs/src/content/docs/cli-reference.md
      - "Cargo.toml"
      - "build.rs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust build ──────────────────────────────────────────────────────────
      # Running `cargo build` executes build.rs which regenerates:
      #   • docs/src/content/docs/cli-reference.md  (Astro CLI reference page)
      #   • man/*.1                                  (man pages)
      #   • completions/*                            (shell completions)
      # The Astro build below then picks up the freshly written cli-reference.md.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate docs artifacts (man pages, completions, CLI reference)
        run: cargo build

      # ── Astro build ─────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build Astro site
        working-directory: docs
        env:
          PUBLIC_GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
